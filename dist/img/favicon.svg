<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Coloured swatches fanning from bottom-left, matching Bootswatch palette -->
  <rect width="22" height="72" x="39" y="4" rx="4" fill="#e74c3c" transform="rotate(-50 50 95)"/>
  <rect width="22" height="72" x="39" y="4" rx="4" fill="#f39c12" transform="rotate(-25 50 95)"/>
  <rect width="22" height="72" x="39" y="4" rx="4" fill="#18bc9c" transform="rotate(0 50 95)"/>
  <rect width="22" height="72" x="39" y="4" rx="4" fill="#2c3e50" transform="rotate(25 50 95)"/>
  <!-- White eye: outer lens shape -->
  <path fill="white" d="M5 50 Q50 8 95 50 Q50 92 5 50Z"/>
  <!-- Iris -->
  <circle cx="50" cy="50" r="20" fill="#2c3e50"/>
  <!-- Pupil -->
  <circle cx="50" cy="50" r="9" fill="white"/>
  <!-- Catchlight -->
  <circle cx="55" cy="44" r="4" fill="white" opacity="0.6"/>
</svg>
